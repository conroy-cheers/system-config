[package]
name = "silakka54-layer-viewer"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
glib = "0.22"
gtk = { package = "gtk4", version = "0.11" }
gtk4-layer-shell = { version = "0.8", features = [ "v1_3" ] }
serde = { version = "1", features = [ "derive" ] }
serde_json = "1"
serde_yaml = "0.9"
